app = "minnano-guitar-youtube"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.youtube-backend"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
